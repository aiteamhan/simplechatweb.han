<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易聊天网页</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>简易聊天</h1>
        <p>支持图片、语音和本地数据保存</p>
      </div>
      <button id="clearDataBtn" class="button button--secondary">清空记录</button>
    </header>

    <main class="chat-panel">
      <div id="chatList" class="chat-list"></div>
    </main>

    <section class="input-panel">
      <div class="chat-input-wrapper">
        <div class="text-input-shell">
          <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
        </div>
        <div class="right-actions">
          <button id="recordBtn" class="icon-button record-button" type="button" aria-label="长按录音">🎙</button>
          <button id="emojiBtn" class="icon-button emoji-button" type="button" aria-label="表情">😊</button>
          <div class="panel-group">
            <button id="sendToggleBtn" class="icon-button plus-button" type="button" aria-label="发送或更多">+</button>
            <div id="plusPanel" class="popup-panel plus-panel" role="menu" aria-hidden="true">
              <div class="panel-item">
                <label class="panel-action" for="cameraInput">
                  <span>📷</span>
                  <span>拍照</span>
                </label>
                <input id="cameraInput" type="file" accept="image/*" capture="environment" />
              </div>
              <div class="panel-item">
                <label class="panel-action" for="imageInput">
                  <span>🖼️</span>
                  <span>相册</span>
                </label>
                <input id="imageInput" type="file" accept="image/*" />
              </div>
              <button class="panel-action" type="button" data-action="file">
                <span>📎</span>
                <span>文件</span>
              </button>
              <button class="panel-action" type="button" data-action="location">
                <span>📍</span>
                <span>位置</span>
              </button>
              <div class="panel-note">更多功能入口</div>
            </div>
          </div>
        </div>
      </div>
      <div id="emojiPanel" class="popup-panel emoji-panel" role="menu" aria-hidden="true">
        <div class="panel-title">表情</div>
        <div class="emoji-list">
          <button type="button" class="emoji-option">😊</button>
          <button type="button" class="emoji-option">😂</button>
          <button type="button" class="emoji-option">😍</button>
          <button type="button" class="emoji-option">😢</button>
          <button type="button" class="emoji-option">👍</button>
          <button type="button" class="emoji-option">❤️</button>
          <button type="button" class="emoji-option">😎</button>
          <button type="button" class="emoji-option">😁</button>
          <button type="button" class="emoji-option">🙏</button>
          <button type="button" class="emoji-option">😜</button>
          <button type="button" class="emoji-option">🎉</button>
          <button type="button" class="emoji-option">😘</button>
          <button type="button" class="emoji-option">😅</button>
          <button type="button" class="emoji-option">😇</button>
          <button type="button" class="emoji-option">😡</button>
          <button type="button" class="emoji-option">😱</button>
          <button type="button" class="emoji-option">💪</button>
          <button type="button" class="emoji-option">🥰</button>
          <button type="button" class="emoji-option">🥲</button>
          <button type="button" class="emoji-option">🤔</button>
          <button type="button" class="emoji-option">🤩</button>
          <button type="button" class="emoji-option">🙌</button>
          <button type="button" class="emoji-option">💬</button>
          <button type="button" class="emoji-option">🌟</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
